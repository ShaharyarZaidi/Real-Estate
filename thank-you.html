<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Thank You | Acme Realty</title>
    <style>
      :root {
        --bg: #efefef;
        --card: #ffffff;
        --text: #14161b;
        --muted: #4a4f57;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: "Montserrat", Arial, sans-serif;
        background: linear-gradient(180deg, #f7f7f7, var(--bg));
        color: var(--text);
        display: grid;
        place-items: center;
        padding: 24px;
      }

      .card {
        width: min(680px, 100%);
        background: var(--card);
        border: 1px solid #d7d9de;
        border-radius: 10px;
        box-shadow: 0 12px 30px rgba(0, 0, 0, 0.14);
        padding: 34px 28px;
        text-align: center;
      }

      h1 {
        margin: 0 0 12px;
        font-size: clamp(1.7rem, 4vw, 2.6rem);
      }

      p {
        margin: 0;
        font-size: 1.05rem;
        color: var(--muted);
        line-height: 1.6;
      }

      a {
        display: inline-block;
        margin-top: 20px;
        text-decoration: none;
        font-weight: 700;
        color: #111;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>Thank You</h1>
      <p>Thank you for submitting the form. Our team will contact you shortly.</p>
      <a href="index.html">Back to Home</a>
    </main>
  </body>
</html>
